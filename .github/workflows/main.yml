name: stop concurrency

on: 
  push:
    branches: [main ]

jobs:
  build:
    runs-on: ubuntu-latest

    concurrency:
      group: deploy
      cancel-in-progress:  true
    steps:
      -   name: Checkout Repository
          uses: actions/checkout@v7.0.0
      -   name: Install Dependency
          run: npm install
      -   name: Build Next.Js App
          run: npm run build
      -   name: Deploy App
          run: echo "Deloyed" 
